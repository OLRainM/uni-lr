<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>藏药商城 · 商家后台</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 登录蒙层 -->
  <div id="loginMask" class="login-mask">
    <div class="login-box">
      <div class="login-logo">🏔️</div>
      <h2 class="login-title">藏药商城 商家后台</h2>
      <div class="form-group">
        <label>管理秘钥</label>
        <input id="loginKey" type="password" placeholder="请输入管理秘钥" autocomplete="off" />
      </div>
      <button class="btn btn-primary btn-block" onclick="doLogin()">登 录</button>
      <p class="login-tip">请联系系统管理员获取登录秘钥</p>
    </div>
  </div>

  <!-- 主布局 -->
  <div id="app" class="app hidden">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-icon">🏔️</span>
        <span class="sidebar-title">藏药商城后台</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard',this)">
          <span class="nav-icon">📊</span> 数据概览
        </a>
        <a class="nav-item" data-page="products" onclick="switchPage('products',this)">
          <span class="nav-icon">📦</span> 商品管理
        </a>
        <a class="nav-item" data-page="orders" onclick="switchPage('orders',this)">
          <span class="nav-icon">🧾</span> 订单管理
        </a>
        <a class="nav-item" data-page="users" onclick="switchPage('users',this)">
          <span class="nav-icon">👥</span> 用户管理
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="doLogout()">退出登录</button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <header class="topbar">
        <span id="pageTitle" class="topbar-title">数据概览</span>
        <span class="topbar-admin">👤 管理员</span>
      </header>

      <!-- 各页面内容 -->
      <div id="page-dashboard" class="page active"></div>
      <div id="page-products"  class="page"></div>
      <div id="page-orders"    class="page"></div>
      <div id="page-users"     class="page"></div>
    </main>
  </div>

  <!-- 弹窗 -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span id="modalTitle">弹窗</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal()">取消</button>
        <button id="modalConfirm" class="btn btn-primary" onclick="onModalConfirm()">确认</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="pages/dashboard.js"></script>
  <script src="pages/products.js"></script>
  <script src="pages/orders.js"></script>
  <script src="pages/users.js"></script>
  <script src="app.js"></script>
</body>
</html>
